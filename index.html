<script>
function switchTab(index){
    const tabs = document.querySelectorAll('.tab-content');
    const btns = document.querySelectorAll('.tab-btn');
    tabs.forEach((item,i)=>{
        item.classList.remove('show');
        btns[i].classList.remove('active');
    });
    tabs[index].classList.add('show');
    btns[index].classList.add('active');
}

let currentLang = navigator.language || navigator.userLanguage;
let lang = currentLang.startsWith('fr') ? 'fr' : 'en';

function initLang(lang) {
  document.querySelectorAll('[data-en]').forEach(el => {
    el.textContent = el.getAttribute(`data-${lang}`);
  });
  document.querySelector('html').setAttribute('lang', lang);
  document.querySelector('.lang-switch').textContent = lang === 'fr' ? 'FR / EN' : 'EN / FR';
}
function toggleLang() {
  lang = lang === 'en' ? 'fr' : 'en';
  initLang(lang);
}
initLang(lang);

const bgMusic = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');
let musicPlay = false;
document.body.addEventListener('click',()=>{
  if(!musicPlay){
    bgMusic.volume = 0.3;
    bgMusic.play();
    musicPlay = true;
    musicBtn.innerText = '🔊';
  }
})
musicBtn.onclick = function(){
  if(bgMusic.paused){bgMusic.play();this.innerText='🔊'}
  else{bgMusic.pause();this.innerText='🔇'}
}

// 概率：大奖10%  中等20%(免服务费+折扣)  普通70%
let chance = 1;
let isDrawing = false;
const wheel = document.getElementById('wheel');
const chanceDom = document.getElementById('chanceCount');
const drawBtn = document.getElementById('drawBtn');
const shareBtn = document.getElementById('shareBtn');
const popup = document.getElementById('popup');
const popTitle = document.getElementById('popTitle');
const popText = document.getElementById('popText');

// 已改成：免服务费
const prizeListEn = [
  "Service Fee Waiver",
  "5% Wholesale Discount",
  "Free Product Sample",
  "Agent Exclusive Price",
  "$10 Store Credit",
  "Priority Shipping Service"
];
const prizeListFr = [
  "Frais de service gratuit",
  "Remise Gros 5%",
  "Échantillon Gratuit",
  "Prix Exclusif Agent",
  "Crédit Boutique 10$",
  "Service Livraison Prioritaire"
];
const angleArr = [30,90,150,210,270,330];

function getRandomPrizeIndex(){
  let r = Math.random() * 100;
  // 大奖 10%
  if(r < 10){
    return [2,4][Math.floor(Math.random()*2)];
  }
  // 中等：免服务费 + 折扣 20%
  else if(r >= 10 && r < 30){
    return [0,1][Math.floor(Math.random()*2)];
  }
  // 普通安慰奖 70%
  else{
    return [3,5][Math.floor(Math.random()*2)];
  }
}

drawBtn.onclick = function(){
  if(isDrawing)return;
  if(chance <= 0){
    if(lang==='en')alert("No chance left! Please share to get more.")
    else alert("Plus de chance ! Partagez pour en obtenir.")
    return;
  }
  isDrawing = true;
  chance--;
  chanceDom.innerText = chance;

  let randomIndex = getRandomPrizeIndex();
  let targetAngle = 1800 + angleArr[randomIndex];
  wheel.style.transform = `rotate(${targetAngle}deg)`;

  setTimeout(()=>{
    isDrawing = false;
    let prize = lang==='en' ? prizeListEn[randomIndex] : prizeListFr[randomIndex];
    if(lang==='en'){
      popTitle.innerText = "🎉 Congratulations!";
      popText.innerText = "You won: " + prize;
    }else{
      popTitle.innerText = "🎉 Félicitations !";
      popText.innerText = "Vous avez gagné : " + prize;
    }
    popup.style.display = "flex";
  },4000)
}

shareBtn.onclick = function(){
  chance += 1;
  chanceDom.innerText = chance;
  if(lang==='en')alert("✅ Share success! You get +1 draw chance")
  else alert("✅ Partage réussi ! +1 chance obtenue")
}

function closePop(){
  popup.style.display = "none";
}

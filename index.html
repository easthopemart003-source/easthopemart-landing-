<script>
function switchTab(idx){
    const tabs = document.querySelectorAll('.tab-content');
    const btns = document.querySelectorAll('.tab-btn');
    tabs.forEach((tab,i)=>{
        tab.classList.remove('show');
        btns[i].classList.remove('active');
    });
    tabs[idx].classList.add('show');
    btns[idx].classList.add('active');
}

let isEN = true;
const userLang = localStorage.getItem("siteLang");

if(userLang){
    isEN = userLang === "en";
}else{
    const sysLang = navigator.language || navigator.userLanguage || "";
    isEN = !sysLang.toLowerCase().startsWith("fr");
}

function renderLang(){
    document.querySelectorAll('[data-en]').forEach(el=>{
        el.innerText = isEN ? el.dataset.en : el.dataset.fr;
    });
    document.querySelectorAll('[data-placeholder-en]').forEach(el=>{
        el.placeholder = isEN ? el.dataset.placeholderEn : el.dataset.placeholderFr;
    });
}

function toggleLang(){
    isEN = !isEN;
    localStorage.setItem("siteLang", isEN ? "en" : "fr");
    renderLang();
}

renderLang();

function fillProduct(pName){
    switchTab(1);
    if(isEN){
        document.getElementById("userMsg").value = 
`Interested product: ${pName}
I want to know detailed factory price, MOQ, shipping cost and exclusive agent cooperation policy for Africa market.`;
    }else{
        document.getElementById("userMsg").value = 
`Produit intéressé: ${pName}
Je souhaite connaître le prix d'usine détaillé, la quantité minimale de commande, les frais d'expédition et la politique de coopération d'agent exclusif pour le marché africain.`;
    }
}

const MY_WA_NUMBER = "8618069950755";

function submitInquiry(){
    let name = document.getElementById("userName").value.trim();
    let country = document.getElementById("userCountry").value.trim();
    let phone = document.getElementById("userPhone").value.trim();
    let msg = document.getElementById("userMsg").value.trim();

    if(!name || !country || !phone){
        showTip(isEN ? "Please fill in Name / Country / Phone" : "Veuillez remplir Nom / Pays / Téléphone");
        return;
    }

    let content;
    if(isEN){
        content = 
`=============================
🌍 WEBSITE CUSTOMER INQUIRY
=============================
Name: ${name}
Country: ${country}
Contact: ${phone}

Message:
${msg}
=============================`;
    }else{
        content = 
`=============================
🌍 DEMANDE CLIENT SITE WEB
=============================
Nom: ${name}
Pays: ${country}
Contact: ${phone}

Message:
${msg}
=============================`;
    }

    let waUrl = "https://wa.me/" + MY_WA_NUMBER + "?text=" + encodeURIComponent(content);
    window.open(waUrl, "_blank");

    showTip(isEN ? "Opening WhatsApp automatically..." : "Ouverture automatique de WhatsApp...");

    document.getElementById("userName").value = "";
    document.getElementById("userCountry").value = "";
    document.getElementById("userPhone").value = "";
    document.getElementById("userMsg").value = "";
}

function showTip(text){
    let tip = document.getElementById("msgTip");
    document.getElementById("msgTipText").innerText = text;
    tip.style.display = "block";
    setTimeout(()=>tip.style.display="none",2000);
}

function fetchEastApi(){
  fetch("https://easthopemart.ng/api")
  .then(res => res.json())
  .then(resData => {
    console.log("✅ API成功返回：", resData);
    document.getElementById("apiShowData").innerText = JSON.stringify(resData, null, 2);
  })
  .catch(err => {
    console.log("❌ API请求异常：", err);
    document.getElementById("apiShowData").innerText = "API Load Failed / CORS Error";
  });
}

setTimeout(function(){
    document.getElementById("waPopup").style.display = "flex";
    fetchEastApi();
}, 3000);

function closePopup(){
    document.getElementById("waPopup").style.display="none";
    localStorage.setItem("popOff","1");
}

const pageUrl = "https://easthopemart.ng";
const shareTextEN = "Become Africa exclusive agent + China wholesale high quality goods, low investment high profit 🚀";
const shareTextFR = "Devenez agent exclusif Afrique + produits de gros Chine haute qualité, faible investissement haut bénéfice 🚀";

document.getElementById("shareWA").onclick = function(){
    let text = isEN ? shareTextEN : shareTextFR;
    let waShare = "https://wa.me/?text=" + encodeURIComponent(text + "\n" + pageUrl);

};
